---
- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker.io
      - python3-docker
    state: present
    update_cache: true

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Stop legacy InfluxDB systemd service if present
  ansible.builtin.systemd:
    name: influxdb
    state: stopped
    enabled: false
  ignore_errors: true

- name: Ensure Docker service is started
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Ensure InfluxDB data directory exists
  ansible.builtin.file:
    path: "{{ influxdb_data_dir }}"
    state: directory
    mode: "0755"

- name: Pull InfluxDB Docker image
  community.docker.docker_image:
    name: "{{ influxdb_docker_image }}"
    state: present
    source: pull

- name: Create InfluxDB container
  community.docker.docker_container:
    name: influxdb
    image: "{{ influxdb_docker_image }}"
    state: started
    restart_policy: always
    ports:
      - "8086:8086"
    volumes:
      - "{{ influxdb_data_dir }}:/var/lib/influxdb"
    memory: "512m"

- name: Wait for InfluxDB to be ready
  ansible.builtin.wait_for:
    host: localhost
    port: 8086
    delay: 2
    timeout: 30

- name: Create InfluxDB database for Telegraf metrics
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE DATABASE telegraf" || true
  ignore_errors: yes

- name: Create InfluxDB database for Nomad autoscaler metrics
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE DATABASE nomad" || true
  ignore_errors: yes

- name: Create retention policy for telegraf database
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE RETENTION POLICY \"autogen\" ON \"telegraf\" DURATION 7d REPLICATION 1 DEFAULT" || true
  ignore_errors: yes

- name: Create retention policy for nomad database
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE RETENTION POLICY \"autogen\" ON \"nomad\" DURATION 7d REPLICATION 1 DEFAULT" || true
  ignore_errors: yes

- name: Create InfluxDB admin user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE USER {{ influxdb_admin_user }} WITH PASSWORD '{{ influxdb_admin_password }}' WITH ALL PRIVILEGES" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Create InfluxDB telegraf user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE USER {{ influxdb_telegraf_user }} WITH PASSWORD '{{ influxdb_telegraf_password }}'" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Grant WRITE on telegraf database to telegraf user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "GRANT WRITE ON telegraf TO {{ influxdb_telegraf_user }}" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Grant READ on telegraf database to telegraf user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "GRANT READ ON telegraf TO {{ influxdb_telegraf_user }}" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Create InfluxDB autoscaler user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "CREATE USER {{ influxdb_autoscaler_user }} WITH PASSWORD '{{ influxdb_autoscaler_password }}'" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Grant READ on telegraf database to autoscaler user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "GRANT READ ON telegraf TO {{ influxdb_autoscaler_user }}" || true
  ignore_errors: yes
  when: influxdb_auth_enabled

- name: Grant READ on nomad database to autoscaler user
  ansible.builtin.shell: |
    docker exec influxdb influx -execute "GRANT READ ON nomad TO {{ influxdb_autoscaler_user }}" || true
  ignore_errors: yes
  when: influxdb_auth_enabled
