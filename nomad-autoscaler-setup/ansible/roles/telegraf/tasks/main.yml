---
- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker.io
      - python3-docker
    state: present
    update_cache: true

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Stop legacy Telegraf systemd service if present
  ansible.builtin.systemd:
    name: telegraf
    state: stopped
    enabled: false
  ignore_errors: true

- name: Ensure Docker service is started
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Ensure Telegraf config directory exists
  ansible.builtin.file:
    path: "{{ telegraf_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Telegraf configuration
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_config_dir }}/telegraf.conf"
    mode: "0644"

- name: Pull Telegraf Docker image
  community.docker.docker_image:
    name: "{{ telegraf_docker_image }}"
    state: present
    source: pull

- name: Get hostname for container name
  ansible.builtin.set_fact:
    container_name: "telegraf-{{ inventory_hostname }}"

- name: Create Telegraf container
  community.docker.docker_container:
    name: "{{ container_name }}"
    image: "{{ telegraf_docker_image }}"
    state: started
    restart_policy: always
    volumes:
      - "{{ telegraf_config_dir }}/telegraf.conf:/etc/telegraf/telegraf.conf:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/sys:/rootfs/sys:ro"
      - "/proc:/rootfs/proc:ro"
      - "/etc:/rootfs/etc:ro"
    network_mode: host
    memory: "256m"
    capabilities:
      - SYS_ADMIN
