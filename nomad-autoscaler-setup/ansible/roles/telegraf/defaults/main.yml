---
telegraf_docker_image: "telegraf:latest"
telegraf_config_dir: "/etc/telegraf"
telegraf_interval: "10s"
telegraf_flush_interval: "10s"
influxdb_endpoint: "http://influxdb-vm.orb.local:8086"
influxdb_database: "telegraf"

# InfluxDB authentication (inherited from influxdb role)
influxdb_telegraf_user: "telegraf"
influxdb_telegraf_password: "telegraf_password"
