---
- name: Install server dependencies
  ansible.builtin.apt:
    name:
      - wget
      - unzip
      - curl
    state: present
    update_cache: true

- name: Ensure Nomad directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/nomad.d
    - /opt/nomad/data

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Download Nomad binary archive
  ansible.builtin.get_url:
    url: "{{ nomad_zip_url }}"
    dest: "{{ nomad_zip_tmp_path }}"
    mode: "0644"

- name: Extract Nomad binary
  ansible.builtin.unarchive:
    src: "{{ nomad_zip_tmp_path }}"
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/nomad

- name: Ensure Nomad binary is executable
  ansible.builtin.file:
    path: /usr/local/bin/nomad
    mode: "0755"

- name: Deploy Nomad server configuration
  ansible.builtin.template:
    src: server.hcl.j2
    dest: /etc/nomad.d/server.hcl
    mode: "0644"
  notify: Restart nomad

- name: Deploy Nomad systemd unit
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nomad

- name: Ensure Nomad service is enabled and started
  ansible.builtin.systemd:
    name: nomad
    daemon_reload: true
    enabled: true
    state: started

- name: Wait for Nomad API to become ready
  ansible.builtin.uri:
    url: http://127.0.0.1:4646/v1/status/leader
    method: GET
    status_code: 200
  register: nomad_leader_status
  retries: 20
  delay: 3
  until: nomad_leader_status.status == 200 and (nomad_leader_status.content | default('')) != '""'
  when:
    - nomad_create_test_namespaces
    - inventory_hostname == groups['nomad_servers'][0]

- name: Write Nomad namespace definitions
  ansible.builtin.copy:
    dest: "/tmp/nomad-namespace-{{ item }}.hcl"
    mode: "0644"
    content: |
      name = "{{ item }}"
      description = "Autoscaler test namespace {{ item }}"
  loop: "{{ nomad_test_namespaces }}"
  when:
    - nomad_create_test_namespaces
    - inventory_hostname == groups['nomad_servers'][0]

- name: Create or update Nomad namespaces
  ansible.builtin.command: "nomad namespace apply /tmp/nomad-namespace-{{ item }}.hcl"
  environment:
    NOMAD_ADDR: "http://127.0.0.1:4646"
  loop: "{{ nomad_test_namespaces }}"
  changed_when: true
  when:
    - nomad_create_test_namespaces
    - inventory_hostname == groups['nomad_servers'][0]

- name: Remove downloaded Nomad archive
  ansible.builtin.file:
    path: "{{ nomad_zip_tmp_path }}"
    state: absent
