---
- name: Install server dependencies
  ansible.builtin.apt:
    name:
      - wget
      - unzip
      - curl
    state: present
    update_cache: true

- name: Ensure Nomad directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/nomad.d
    - /opt/nomad/data

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Download Nomad binary archive
  ansible.builtin.get_url:
    url: "{{ nomad_zip_url }}"
    dest: "{{ nomad_zip_tmp_path }}"
    mode: "0644"

- name: Extract Nomad binary
  ansible.builtin.unarchive:
    src: "{{ nomad_zip_tmp_path }}"
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/nomad

- name: Ensure Nomad binary is executable
  ansible.builtin.file:
    path: /usr/local/bin/nomad
    mode: "0755"

- name: Validate Nomad Enterprise license is provided
  ansible.builtin.assert:
    that:
      - (lookup('ansible.builtin.env', 'NOMAD_ENTERPRISE_LICENSE') | default('', true) | length) > 0
    fail_msg: "NOMAD_ENTERPRISE_LICENSE is empty. Add it to your local .env before running make ansible."
  when: "'+ent' in nomad_version"

- name: Write Nomad Enterprise license file
  ansible.builtin.copy:
    dest: "{{ nomad_license_path }}"
    content: "{{ lookup('ansible.builtin.env', 'NOMAD_ENTERPRISE_LICENSE') }}\n"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: "'+ent' in nomad_version"
  notify: Restart nomad

- name: Deploy Nomad server configuration
  ansible.builtin.template:
    src: server.hcl.j2
    dest: /etc/nomad.d/server.hcl
    mode: "0644"
  notify: Restart nomad

- name: Deploy Nomad systemd unit
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nomad

- name: Ensure Nomad service is enabled and started
  ansible.builtin.systemd:
    name: nomad
    daemon_reload: true
    enabled: true
    state: started

- name: Remove downloaded Nomad archive
  ansible.builtin.file:
    path: "{{ nomad_zip_tmp_path }}"
    state: absent
