---
- name: Install Prometheus dependencies
  ansible.builtin.apt:
    name:
      - wget
      - tar
    state: present
    update_cache: true

- name: Replace OrbStack resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Configure DNS resolvers
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8

- name: Ensure Prometheus group exists
  ansible.builtin.group:
    name: prometheus
    system: true

- name: Ensure Prometheus user exists
  ansible.builtin.user:
    name: prometheus
    group: prometheus
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Ensure Prometheus directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop:
    - { path: "/etc/prometheus", owner: "prometheus", group: "prometheus" }
    - { path: "/var/lib/prometheus", owner: "prometheus", group: "prometheus" }

- name: Download Prometheus archive
  ansible.builtin.get_url:
    url: "{{ prometheus_archive_url }}"
    dest: "{{ prometheus_archive_tmp_path }}"
    mode: "0644"

- name: Extract Prometheus archive
  ansible.builtin.unarchive:
    src: "{{ prometheus_archive_tmp_path }}"
    dest: /tmp
    remote_src: true
    creates: "{{ prometheus_extract_dir }}"

- name: Install Prometheus binary
  ansible.builtin.copy:
    src: "{{ prometheus_extract_dir }}/prometheus"
    dest: /usr/local/bin/prometheus
    remote_src: true
    mode: "0755"

- name: Install promtool binary
  ansible.builtin.copy:
    src: "{{ prometheus_extract_dir }}/promtool"
    dest: /usr/local/bin/promtool
    remote_src: true
    mode: "0755"

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart prometheus

- name: Deploy Prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prometheus

- name: Ensure Prometheus service is enabled and started
  ansible.builtin.systemd:
    name: prometheus
    daemon_reload: true
    enabled: true
    state: started

- name: Remove temporary Prometheus artifacts
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ prometheus_extract_dir }}"
    - "{{ prometheus_archive_tmp_path }}"
